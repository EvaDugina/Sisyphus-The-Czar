services:
  sisyphus-the-czar-dev:
    build:
      context: .
      target: development
    container_name: sisyphus-the-czar-dev
    init: true
    environment:
      PORT: "8080"
      DEBUG: "true"
      SESSION_TTL_SECONDS: "86400"
    ports:
      - "127.0.0.1:18082:8080"
    volumes:
      - ./index.html:/app/index.html:ro
      - ./assets:/app/assets:ro
      - ./server:/app/server:ro
      - ./shared:/app/shared:ro
