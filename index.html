        }

        if (collab.enabled) {
          beginSharedDrag(event);
          return;
        }

        if (motion.phase === PHASES.INTRO) {
          event.preventDefault();
          if (motion.dragging || motion.firstFallTimerId !== null) {
            return;
          }

          toggleHandVariant();
          updateBounds();
          const rect = rock.getBoundingClientRect();
          motion.dragging = true;
          motion.activePointerId = event.pointerId;
          motion.grabX = event.clientX - rect.left;
          motion.grabY = event.clientY - rect.top;
          motion.dragTargetX = motion.x;
          motion.dragTargetY = motion.y;
          motion.pointerVx = 0;
          motion.pointerVy = 0;
          motion.lastPointerAt = 0;
          recordPointerVelocity(event);
          showHandCursor(event);
          setGrabbingCursor(true);
          rock.classList.remove("is-falling");
          rock.classList.add("is-dragging");
          rock.setPointerCapture(event.pointerId);
          startFirstFall();
          return;
        }

        if (motion.phase !== PHASES.PLAY) {
          return;
        }

        event.preventDefault();
        if (params.trailReset) {
          resetTrail();
        }
        toggleHandVariant();
        updateBounds();
        const rect = rock.getBoundingClientRect();
        motion.dragging = true;
        motion.activePointerId = event.pointerId;
        motion.grabX = event.clientX - rect.left;
        motion.grabY = event.clientY - rect.top;
        motion.dragTargetX = motion.x;
        motion.dragTargetY = motion.y;
        motion.pointerVx = 0;
        motion.pointerVy = 0;
        motion.lastPointerAt = 0;
        recordPointerVelocity(event);
        showHandCursor(event);
        setGrabbingCursor(true);
        rock.classList.remove("is-falling");
        rock.classList.add("is-dragging");
        rock.setPointerCapture(event.pointerId);
        scheduleHoldLimit();
        startLoop();
      }

      function moveDrag(event) {
        if (collab.enabled) {
          moveSharedDrag(event);
          return;
        }

        moveHandCursor(event);

        if (
          !motion.dragging ||
          (motion.phase !== PHASES.INTRO && motion.phase !== PHASES.PLAY)
        ) {
          return;
        }

        event.preventDefault();
        recordPointerVelocity(event);
        setDragTargetFromPointer(event);

        if (motion.phase === PHASES.INTRO) {
          applyDragTargetMovement(MAX_FRAME_SECONDS);
        }
      }

      function stopDrag(event) {
        if (collab.enabled) {
          releaseSharedDrag(event);
          return;
        }

        if (!motion.dragging) {
          return;
        }

        const phaseAtRelease = motion.phase;
        clearHoldTimer();
        clearFirstFallTimer();
        motion.dragging = false;
        motion.activePointerId = null;
        rock.classList.remove("is-dragging");
        setGrabbingCursor(false);
        releasePointerCapture(event.pointerId);
        recordPointerVelocity(event);

        if (phaseAtRelease === PHASES.INTRO) {
          beginFirstFall();
          return;
        }

        if (finishIfInTarget()) {
          return;
        }

        applyReleaseImpulse();
        setHandToGrab();
        rock.classList.add("is-falling");
        startLoop();
      }

      function enterRock(event) {
        if (motion.phase === PHASES.WON) {
          return;
        }

        showHandCursor(event);
      }

      function leaveRock() {
        if (!motion.dragging) {
          hideHandCursor();
        }
      }

      function cancelDragAndCursor() {
        if (collab.enabled && motion.dragging) {
          forceReleaseSharedDrag();
          return;
        }

        clearHoldTimer();
        clearFirstFallTimer();
        motion.dragging = false;
        motion.activePointerId = null;
        rock.classList.remove("is-dragging");
        setHandToGrab();
        hideHandCursor();
      }

      function toggleSettings() {
        const isOpen = !settingsPanel.classList.contains("is-open");
        settingsPanel.classList.toggle("is-open", isOpen);
        settingsPanel.setAttribute("aria-hidden", String(!isOpen));
        settingsToggle.setAttribute("aria-expanded", String(isOpen));
      }

      settingsPanel.querySelectorAll("input, select").forEach((el) => {
        el.addEventListener("input", readControls);
        el.addEventListener("change", readControls);
      });

      settingsPanel.querySelector(".trail-clear").addEventListener("click", resetTrail);

      settingsPanel.addEventListener("pointerover", (event) => {
        const target = event.target.closest("[data-hint]");
        if (target) {
          showHint(target);
        }
      });
      settingsPanel.addEventListener("pointerout", (event) => {
        const target = event.target.closest("[data-hint]");
        const next =
          event.relatedTarget && event.relatedTarget.closest
            ? event.relatedTarget.closest("[data-hint]")
            : null;
        if (target && next !== target) {
          hideHint();
        }
      });
      settingsPanel.addEventListener("focusin", (event) => {
        const target = event.target.closest("[data-hint]");
        if (target) {
          showHint(target);
        }
      });
      settingsPanel.addEventListener("focusout", hideHint);

      settingsToggle.addEventListener("click", toggleSettings);
      sessionShare.addEventListener("click", createSharedSession);
      rock.addEventListener("pointerenter", enterRock);
      rock.addEventListener("pointerleave", leaveRock);
      rock.addEventListener("pointerdown", startDrag);
      rock.addEventListener("pointermove", moveDrag);
      rock.addEventListener("pointerup", stopDrag);
      rock.addEventListener("pointercancel", stopDrag);
      rock.addEventListener("lostpointercapture", () => {
        if (motion.dragging) {
          forceReleaseRock();
        }
      });
      rock.addEventListener("dragstart", (event) => event.preventDefault());
      window.addEventListener("blur", cancelDragAndCursor);
      window.addEventListener("resize", () => {
        updateBounds();
        resizeTrailCanvas();
        if (collab.enabled && motion.phase === PHASES.WON) {
          centerRockInLocalTarget();
        } else if (collab.enabled && collab.snapshots.length > 0) {
          applySharedFrame(collab.snapshots.at(-1));
        } else if (motion.phase === PHASES.INTRO) {
          centerIntroRock();
        } else {
          setPosition(motion.x, motion.y);
        }
      });

      function initScene() {
        centerIntroRock();
        resizeTrailCanvas();
        updateSessionStatus();
        if (collab.enabled) {
          connectSharedSession();
        }
      }

      loadSettings();
      readControls();
      window.scrollTo(0, 0);

      if (rock.complete) {
        initScene();
      } else {
        rock.addEventListener("load", initScene, { once: true });
      }
    </script>
  </body>
</html>
