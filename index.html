<!doctype html>
<html lang="ru" class="is-scroll-locked">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Царь Сизиф</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&display=swap");

      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f8f8f5;
        color: #161616;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
        margin: 0;
        scroll-behavior: auto;
      }

      html.is-scroll-locked,
      body.is-scroll-locked {
        overflow-y: hidden;
        overscroll-behavior-y: none;
      }

      html.is-scroll-locked {
        height: 100%;
      }

      body.is-scroll-locked {
        position: fixed;
        inset: 0;
        width: 100%;
      }

      body {
        --surface: #f8f8f5;
        --surface-deep: #e9e8e2;
        --surface-low: #d9d8d1;
        --ink: #161616;
        --muted: rgba(22, 22, 22, 0.62);
        --line: rgba(22, 22, 22, 0.2);
        --panel: rgba(248, 248, 245, 0.88);
        --accent: #8a6b31;
        --accent-strong: #3c2b11;
        --target: rgba(138, 107, 49, 0.18);
        --target-line: rgba(138, 107, 49, 0.56);
        --shadow: rgba(23, 20, 17, 0.18);

        min-height: 200vh;
        margin: 0;
        overflow-x: hidden;
        background: var(--surface);
        color: var(--ink);
        user-select: none;
        transition:
          background-color 420ms ease,
          color 420ms ease;
      }

      body.theme-dark {
        color-scheme: dark;
        --surface: #101211;
        --surface-deep: #191a16;
        --surface-low: #070807;
        --ink: #f4f1ea;
        --muted: rgba(244, 241, 234, 0.64);
        --line: rgba(244, 241, 234, 0.18);
        --panel: rgba(16, 18, 17, 0.86);
        --accent: #b7a06b;
        --accent-strong: #f0dfaa;
        --target: rgba(183, 160, 107, 0.2);
        --target-line: rgba(183, 160, 107, 0.58);
        --shadow: rgba(0, 0, 0, 0.58);
      }

      button,
      input {
        font: inherit;
      }

      .world {
        position: relative;
        height: 200vh;
        min-height: 200vh;
        overflow: hidden;
        background:
          linear-gradient(180deg, var(--surface) 0%, var(--surface-deep) 48%, var(--surface-low) 100%),
          var(--surface);
        transition: background 420ms ease;
      }

      .summit {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        min-height: 100svh;
        pointer-events: none;
      }

      .target-zone {
        position: absolute;
        left: 50%;
        top: 13.5rem;
        z-index: 0;
        display: grid;
        width: min(58rem, calc(100vw - 2rem));
        height: clamp(11rem, 21svh, 13.75rem);
        place-items: center;
        border: 0;
        background: transparent;
        color: transparent;
        font-family:
          "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-size: 2.1rem;
        font-weight: 700;
        letter-spacing: 0;
        text-transform: uppercase;
        transform: translateX(-50%);
        opacity: 0;
        pointer-events: none;
      }

      .title,
      .title2 {
        position: absolute;
        left: 50%;
        z-index: 2;
        width: min(92vw, 76rem);
        margin: 0;
        color: color-mix(in srgb, var(--ink) 88%, transparent);
        font-family:
          "Cormorant Garamond", Georgia, "Times New Roman", serif;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 0.84;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 0.08em 0.16em var(--shadow);
        transform: translateX(-50%);
        transition: color 420ms ease;
      }

      .title {
        top: 15rem;
        font-size: 8.4rem;
      }

      .title2 {
        top: 11.5rem;
        font-size: 3.2rem;
      }

      .rock {
        --rock-x: 0px;
        --rock-y: 0px;
        --rock-scale: 1;

        position: absolute;
        left: 0;
        top: 0;
        z-index: 6;
        width: clamp(440px, 84vmin, 1040px);
        height: auto;
        cursor: grab;
        touch-action: none;
        -webkit-user-drag: none;
        user-drag: none;
        filter: drop-shadow(0 2.1rem 2.2rem var(--shadow));
        transform: translate3d(var(--rock-x), var(--rock-y), 0) scale(var(--rock-scale));
        transform-origin: center;
        transition:
          filter 160ms ease,
          opacity 240ms ease;
        will-change: transform;
      }

      .rock-imprint {
        --imprint-x: 0px;
        --imprint-y: 0px;

        position: absolute;
        left: 0;
        top: 0;
        z-index: 4;
        width: clamp(440px, 84vmin, 1040px);
        height: auto;
        opacity: 0;
        pointer-events: none;
        filter: grayscale(1) contrast(0.72);
        transform: translate3d(var(--imprint-x), var(--imprint-y), 0);
        transition: opacity 220ms ease;
        user-select: none;
        will-change: transform, opacity;
      }

      .rock-imprint.is-visible {
        opacity: 0.22;
      }

      .rock.is-dragging {
        --rock-scale: 1;
        cursor: grabbing;
        filter: drop-shadow(0 2.7rem 2.6rem var(--shadow));
      }

      .rock.is-falling {
        filter: drop-shadow(0 3rem 2.8rem var(--shadow));
      }

      body.state-won .rock {
        --rock-scale: 1;
        cursor: default;
        filter: drop-shadow(0 1.6rem 1.8rem rgba(43, 34, 17, 0.24));
      }

      .hand-cursor {
        --cursor-x: -999px;
        --cursor-y: -999px;
        --cursor-width: 552px;
        --cursor-height: 732px;
        --hotspot-x: 276px;
        --hotspot-y: 252px;

        position: fixed;
        left: 0;
        top: 0;
        z-index: 20;
        display: none;
        width: var(--cursor-width);
        height: var(--cursor-height);
        background-image: url("assets/cursor-grab.png");
        background-position: center top;
        background-repeat: no-repeat;
        background-size: contain;
        filter: drop-shadow(0 1rem 1.2rem rgba(0, 0, 0, 0.48));
        opacity: 0;
        pointer-events: none;
        transform: translate3d(
            calc(var(--cursor-x) - var(--hotspot-x)),
            calc(var(--cursor-y) - var(--hotspot-y)),
            0
          )
          scale(0.96);
        transform-origin: var(--hotspot-x) var(--hotspot-y);
        transition:
          opacity 90ms ease,
          filter 130ms ease;
        will-change: transform, opacity;
      }

      .hand-cursor.is-visible {
        opacity: 1;
        transform: translate3d(
            calc(var(--cursor-x) - var(--hotspot-x)),
            calc(var(--cursor-y) - var(--hotspot-y)),
            0
          )
          scale(1);
      }

      .hand-cursor.is-alternate {
        --hotspot-y: 216px;

        background-image: url("assets/cursor-grabbing.png");
      }

      .hand-cursor.is-grabbing {
        --hotspot-y: 216px;

        background-image: url("assets/cursor-grabbing.png");
        filter: drop-shadow(0 1.25rem 1.35rem rgba(0, 0, 0, 0.62));
        transform: translate3d(
            calc(var(--cursor-x) - var(--hotspot-x)),
            calc(var(--cursor-y) - var(--hotspot-y)),
            0
          )
          scale(1.04);
      }

      .hand-cursor.is-remote {
        z-index: 19;
        display: block;
        opacity: 0;
        transition:
          opacity 120ms ease,
          filter 130ms ease,
          transform 70ms linear;
      }

      .hand-cursor.is-remote.is-visible {
        opacity: 1;
      }

      .settings-toggle,
      .session-share-toggle {
        position: fixed;
        top: 1rem;
        z-index: 30;
        display: grid;
        width: 2.75rem;
        min-width: 2.75rem;
        max-width: 2.75rem;
        height: 2.75rem;
        min-height: 2.75rem;
        max-height: 2.75rem;
        padding: 0;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 50%;
        background: var(--panel);
        color: var(--ink);
        cursor: pointer;
        box-shadow: 0 0.8rem 1.4rem color-mix(in srgb, var(--shadow) 38%, transparent);
        backdrop-filter: blur(12px);
        transition:
          background 220ms ease,
          border-color 220ms ease,
          transform 180ms ease;
      }

      .settings-toggle {
        right: 1rem;
      }

      .session-share-toggle {
        right: 4.5rem;
      }

      .session-share-toggle svg {
        width: 1.1rem;
        height: 1.1rem;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 1.8;
      }

      .session-share-toggle [data-share-icon="check"] {
        display: none;
      }

      .session-share-toggle.is-copied [data-share-icon="link"] {
        display: none;
      }

      .session-share-toggle.is-copied [data-share-icon="check"] {
        display: block;
      }

      .settings-toggle:hover,
      .session-share-toggle:hover {
        transform: translateY(-1px);
      }

      .settings-toggle[aria-expanded="true"] {
        border-color: var(--target-line);
      }

      .session-share-toggle[data-state="online"] {
        border-color: var(--target-line);
      }

      .settings-panel {
        position: fixed;
        right: 1rem;
        top: 4.25rem;
        z-index: 29;
        width: min(19rem, calc(100vw - 2rem));
        max-height: calc(100dvh - 5.5rem);
        overflow-y: auto;
        padding: 1rem;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        box-shadow: 0 1rem 2rem color-mix(in srgb, var(--shadow) 38%, transparent);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.6rem);
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        backdrop-filter: blur(14px);
      }

      .settings-panel.is-open {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
      }

      .control {
        display: grid;
        gap: 0.45rem;
      }

      .control + .control {
        margin-top: 0.9rem;
      }

      .control-label {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        color: var(--ink);
        font-size: 0.92rem;
      }

      .control-value {
        color: var(--muted);
        font-variant-numeric: tabular-nums;
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
      }

      .control select {
        width: 100%;
        padding: 0.32rem 0.4rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: color-mix(in srgb, var(--surface) 55%, transparent);
        color: var(--ink);
        font: inherit;
        font-size: 0.9rem;
        cursor: pointer;
      }

      .control input[type="color"] {
        width: 100%;
        height: 1.9rem;
        padding: 2px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: color-mix(in srgb, var(--surface) 55%, transparent);
        cursor: pointer;
      }

      .control.is-check {
        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 0.55rem;
        cursor: pointer;
      }

      .control.is-check input[type="checkbox"] {
        flex: none;
        width: 1rem;
        height: 1rem;
        accent-color: var(--accent);
      }

      .control.is-check span {
        font-size: 0.92rem;
      }

      .control.is-disabled {
        opacity: 0.5;
      }

      .trail-clear,
      .session-restart {
        width: 100%;
        margin-top: 0.7rem;
        padding: 0.45rem 0.6rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: color-mix(in srgb, var(--surface) 55%, transparent);
        color: var(--ink);
        cursor: pointer;
        transition:
          background 180ms ease,
          border-color 180ms ease;
      }

      .trail-clear:hover,
      .session-restart:hover {
        border-color: var(--target-line);
        background: color-mix(in srgb, var(--surface) 80%, transparent);
      }

      .session-panel {
        display: grid;
        gap: 0.65rem;
        margin-bottom: 0.7rem;
        padding-bottom: 0.75rem;
        border-bottom: 1px solid var(--line);
      }

      .session-state {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
        color: var(--muted);
        font-size: 0.82rem;
        line-height: 1.3;
      }

      .session-state::before {
        content: "";
        flex: none;
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--muted);
        box-shadow: 0 0 0 0.2rem color-mix(in srgb, var(--muted) 12%, transparent);
      }

      .session-state[data-state="online"]::before {
        background: #55a86a;
        box-shadow: 0 0 0 0.2rem rgba(85, 168, 106, 0.16);
      }

      .session-state[data-state="connecting"]::before {
        background: #c09645;
        animation: session-pulse 1.1s ease-in-out infinite;
      }

      .session-state[data-state="error"]::before {
        background: #b85252;
      }

      @keyframes session-pulse {
        50% {
          opacity: 0.42;
        }
      }

      .control-group {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 0;
        padding: 0.65rem 0 0.15rem;
      }

      .control-group:first-of-type {
        border-top: 0;
        padding-top: 0;
      }

      .control-group > summary {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.2rem 0;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
        list-style: none;
        user-select: none;
      }

      .control-group > summary::-webkit-details-marker {
        display: none;
      }

      .control-group > summary::before {
        content: "▸";
        display: inline-block;
        color: var(--accent);
        transition: transform 160ms ease;
      }

      .control-group[open] > summary::before {
        transform: rotate(90deg);
      }

      .control-group[open] > summary {
        margin-bottom: 0.6rem;
      }

      .hint {
        position: fixed;
        z-index: 40;
        max-width: 15rem;
        padding: 0.5rem 0.65rem;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        font-size: 0.8rem;
        line-height: 1.35;
        box-shadow: 0 0.6rem 1.4rem color-mix(in srgb, var(--shadow) 42%, transparent);
        backdrop-filter: blur(14px);
        opacity: 0;
        pointer-events: none;
        transform: translateY(-0.2rem);
        transition:
          opacity 120ms ease,
          transform 120ms ease;
      }

      .hint.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .trail {
        position: fixed;
        inset: 0;
        z-index: 5;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        mix-blend-mode: difference;
      }

      @media (pointer: fine) {
        .rock {
          cursor: none;
        }

        .rock.is-dragging {
          cursor: none;
        }

        .hand-cursor {
          display: block;
        }
      }

      @media (max-width: 760px) {
        .target-zone {
          top: 9.8rem;
          height: 9.8rem;
          font-size: 1.5rem;
        }

        .title {
          top: 10.7rem;
          width: min(94vw, 28rem);
          font-size: 4.4rem;
          line-height: 0.88;
        }

        .title2 {
          top: 8.6rem;
          font-size: 2.1rem;
        }

        .rock,
        .rock-imprint {
          width: clamp(300px, 90vw, 520px);
        }

        .hand-cursor {
          --cursor-width: 432px;
          --cursor-height: 570px;
          --hotspot-x: 216px;
          --hotspot-y: 198px;
        }

        .hand-cursor.is-grabbing {
          --hotspot-y: 168px;
        }

        .hand-cursor.is-alternate {
          --hotspot-y: 168px;
        }

      }
    </style>
  </head>
  <body class="state-intro theme-light is-scroll-locked">
    <button
      class="session-share-toggle"
      type="button"
      data-testid="share-session-top"
      data-state="local"
      aria-label="Скопировать ссылку"
      title="Скопировать ссылку"
    >
      <svg data-share-icon="link" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M10 13a5 5 0 0 0 7.1.1l2-2a5 5 0 0 0-7.1-7.1l-1.1 1.1" />
        <path d="M14 11a5 5 0 0 0-7.1-.1l-2 2A5 5 0 0 0 12 20l1.1-1.1" />
      </svg>
      <svg data-share-icon="check" viewBox="0 0 24 24" aria-hidden="true">
        <path d="m5 12 4 4L19 6" />
      </svg>
    </button>

    <button
      class="settings-toggle"
      type="button"
      aria-controls="settings-panel"
      aria-expanded="false"
      aria-label="Параметры"
      title="Параметры"
    >
      ⚙
    </button>

    <aside class="settings-panel" id="settings-panel" aria-hidden="true">
      <section class="session-panel" aria-label="Совместная сессия">
        <div
          class="session-state"
          data-session-status
          data-state="local"
          data-testid="session-status"
          aria-live="polite"
        >
          Локальная сессия
        </div>
        <button
          class="session-restart"
          type="button"
          data-testid="restart-session"
          data-hint="Возвращает камень, отпечаток и след в начало текущей комнаты."
        >
          Начать сначала
        </button>
      </section>

      <details class="control-group" open>
        <summary>Физика</summary>

        <label
          class="control"
          data-hint="Масса камня. Чем тяжелее — тем медленнее подъём, медленнее разгон и слабее бросок."
        >
          <span class="control-label">
            <span>Масса</span>
            <output class="control-value" data-output="mass">4</output>
          </span>
          <input name="mass" type="range" min="1" max="100" step="1" value="4" />
        </label>

        <label
          class="control"
          data-hint="Сила притяжения к земле. Больше значение — камень падает быстрее и медленнее поднимается."
        >
          <span class="control-label">
            <span>Тяготение</span>
            <output class="control-value" data-output="gravity">1.0</output>
          </span>
          <input name="gravity" type="range" min="1" max="10" step="0.1" value="1" />
        </label>

        <label
          class="control"
          data-hint="Сила руки при броске. Больше — камень летит выше и дальше."
        >
          <span class="control-label">
            <span>Сила</span>
            <output class="control-value" data-output="handForce">5</output>
          </span>
          <input name="handForce" type="range" min="1" max="10" step="1" value="5" />
        </label>

        <label
          class="control"
          data-hint="Насколько скорость движения мыши влияет на силу броска. Ноль — рывок не учитывается."
        >
          <span class="control-label">
            <span>Влияние рывка</span>
            <output class="control-value" data-output="pointerInfluence">1.0</output>
          </span>
          <input name="pointerInfluence" type="range" min="0" max="2" step="0.1" value="1" />
        </label>

        <label
          class="control"
          data-hint="Сила пружинистого подпрыгивания камня при ударе о низ. Ноль — камень просто останавливается без отскока."
        >
          <span class="control-label">
            <span>Пружинистость</span>
            <output class="control-value" data-output="bounce">0.35</output>
          </span>
          <input name="bounce" type="range" min="0" max="1" step="0.05" value="0.35" />
        </label>

        <label
          class="control"
          data-hint="Насколько камень сохраняет горизонтальный импульс после броска. Больше — дольше несёт по инерции; меньше — быстрее теряет ход."
        >
          <span class="control-label">
            <span>Инерция</span>
            <output class="control-value" data-output="inertia">0.90</output>
          </span>
          <input name="inertia" type="range" min="0" max="1" step="0.05" value="0.9" />
        </label>

        <label
          class="control"
          data-hint="Трение пола. Больше значение — камень быстрее тормозит, когда скользит по нижней поверхности."
        >
          <span class="control-label">
            <span>Скольжение</span>
            <output class="control-value" data-output="sliding">0.35</output>
          </span>
          <input name="sliding" type="range" min="0" max="1" step="0.05" value="0.35" />
        </label>

        <label
          class="control"
          data-hint="Сила воздушной турбулентности при падении: камень покачивается и рыскает в стороны, а не летит по ровной дуге. Ноль — без турбулентности."
        >
          <span class="control-label">
            <span>Турбулентность</span>
            <output class="control-value" data-output="turbulence">0.40</output>
          </span>
          <input name="turbulence" type="range" min="0" max="1" step="0.05" value="0.4" />
        </label>
      </details>

      <details class="control-group" open>
        <summary>След</summary>

        <label
          class="control is-check"
          data-hint="Включает или выключает отрисовку следа за камнем."
        >
          <input name="trailEnabled" type="checkbox" checked />
          <span>Показывать след</span>
        </label>

        <label
          class="control"
          data-hint="Насколько плавно и с какой задержкой линия догоняет камень. Ноль — линия точно повторяет путь; больше — линия мягко тянется за камнем с задержкой и сильнее сглаживается."
        >
          <span class="control-label">
            <span>Задержка</span>
            <output class="control-value" data-output="lineDelay">0.50</output>
          </span>
          <input name="lineDelay" type="range" min="0" max="1" step="0.05" value="0.5" />
        </label>

        <label
          class="control"
          data-hint="Толщина линии следа. Больше значение — толще линия."
        >
          <span class="control-label">
            <span>Толщина</span>
            <output class="control-value" data-output="lineWidth">6</output>
          </span>
          <input name="lineWidth" type="range" min="1" max="60" step="1" value="6" />
        </label>

        <label
          class="control is-check"
          data-hint="Стирать след каждый раз, когда камень берут заново. Выключено — след копится."
        >
          <input name="trailReset" type="checkbox" />
          <span>Сбрасывать при новом броске</span>
        </label>

        <label
          class="control"
          data-hint="Сколько последних точек пути хранить. Больше — длиннее видимый след."
        >
          <span class="control-label">
            <span>Длина следа</span>
            <output class="control-value" data-output="trailMaxPoints">1000</output>
          </span>
          <input name="trailMaxPoints" type="range" min="20" max="2000" step="10" value="1000" />
        </label>

        <label
          class="control is-check"
          data-hint="Не удалять старые точки следа в этом браузере. При долгой работе расход памяти и нагрузка на отрисовку будут расти."
        >
          <input name="trailUnlimited" type="checkbox" />
          <span>Без ограничения длины</span>
        </label>

        <label
          class="control"
          data-hint="Как часто ставится новая точка следа. Меньше значение — точки плотнее и линия глаже."
        >
          <span class="control-label">
            <span>Частота точек</span>
            <output class="control-value" data-output="trailSampleDist">6</output>
          </span>
          <input name="trailSampleDist" type="range" min="1" max="40" step="1" value="6" />
        </label>

        <button
          class="trail-clear"
          type="button"
          data-hint="Стирает нарисованный след прямо сейчас."
        >
          Очистить след
        </button>
      </details>

      <details class="control-group">
        <summary>След — стиль</summary>

        <label
          class="control"
          data-hint="Как след накладывается на фон. «Негатив» делает его белым на тёмном фоне и чёрным на светлом."
        >
          <span class="control-label"><span>Смешивание</span></span>
          <select name="blendMode">
            <option value="difference" selected>Негатив</option>
            <option value="normal">Обычное</option>
            <option value="exclusion">Исключение</option>
            <option value="screen">Осветление</option>
            <option value="multiply">Затемнение</option>
          </select>
        </label>

        <label
          class="control"
          data-hint="Основной цвет следа. При режиме «Негатив» чистый эффект даёт белый."
        >
          <span class="control-label"><span>Цвет линии</span></span>
          <input name="lineColor" type="color" value="#ffffff" />
        </label>

        <label
          class="control"
          data-hint="Цвет дальнего конца следа. Виден, когда включён градиент."
        >
          <span class="control-label"><span>Цвет хвоста</span></span>
          <input name="lineColorTail" type="color" value="#ffffff" />
        </label>

        <label
          class="control is-check"
          data-hint="Плавный переход цвета от начала следа к хвосту."
        >
          <input name="useGradient" type="checkbox" />
          <span>Градиент к хвосту</span>
        </label>

        <label
          class="control"
          data-hint="Общая видимость линии. Меньше значение — бледнее и прозрачнее."
        >
          <span class="control-label">
            <span>Непрозрачность</span>
            <output class="control-value" data-output="lineOpacity">0.90</output>
          </span>
          <input name="lineOpacity" type="range" min="0" max="1" step="0.05" value="0.9" />
        </label>

        <label
          class="control"
          data-hint="Сплошная линия, пунктир или точечный штрих."
        >
          <span class="control-label"><span>Стиль линии</span></span>
          <select name="dashStyle">
            <option value="solid" selected>Сплошная</option>
            <option value="dashed">Пунктир</option>
            <option value="dotted">Точечная</option>
          </select>
        </label>

        <label
          class="control"
          data-hint="Длина чёрточки пунктира. Действует для пунктирного стиля."
        >
          <span class="control-label">
            <span>Длина штриха</span>
            <output class="control-value" data-output="dashLength">12</output>
          </span>
          <input name="dashLength" type="range" min="1" max="40" step="1" value="12" />
        </label>

        <label
          class="control"
          data-hint="Пустое расстояние между чёрточками пунктира."
        >
          <span class="control-label">
            <span>Промежуток</span>
            <output class="control-value" data-output="dashGap">8</output>
          </span>
          <input name="dashGap" type="range" min="0" max="40" step="1" value="8" />
        </label>

        <label
          class="control"
          data-hint="Форма кончиков линии: срез, скругление или квадрат."
        >
          <span class="control-label"><span>Концы линии</span></span>
          <select name="lineCap">
            <option value="round" selected>Скругление</option>
            <option value="butt">Срез</option>
            <option value="square">Квадрат</option>
          </select>
        </label>

        <label
          class="control"
          data-hint="Как выглядят изломы линии на поворотах: острые углы, скругление или срезанная фаска."
        >
          <span class="control-label"><span>Стыки</span></span>
          <select name="lineJoin">
            <option value="round" selected>Скругление</option>
            <option value="miter">Острые</option>
            <option value="bevel">Фаска</option>
          </select>
        </label>

        <label
          class="control"
          data-hint="Мягкое размытое сияние вокруг линии. Ноль — без сияния."
        >
          <span class="control-label">
            <span>Свечение</span>
            <output class="control-value" data-output="glow">0</output>
          </span>
          <input name="glow" type="range" min="0" max="40" step="1" value="0" />
        </label>

        <label
          class="control"
          data-hint="Цвет мягкого сияния вокруг линии."
        >
          <span class="control-label"><span>Цвет свечения</span></span>
          <input name="glowColor" type="color" value="#ffffff" />
        </label>
      </details>

    </aside>

    <div class="hint" role="tooltip" aria-hidden="true"></div>

    <main class="world" aria-label="Сцена Сизифа">
      <canvas class="trail" aria-hidden="true"></canvas>
      <section class="summit" aria-hidden="true">
        <div class="target-zone"></div>
        <h2 class="title2">Миниатюра</h2>
        <h1 class="title">Царь Сизиф</h1>
      </section>

      <img
        class="rock-imprint"
        src="assets/rock.png"
        alt=""
        aria-hidden="true"
        data-testid="rock-imprint"
        draggable="false"
      />
      <img
        class="rock"
        src="assets/rock.png"
        alt="Камень"
        draggable="false"
      />
      <div class="remote-cursors" aria-hidden="true"></div>
      <div class="hand-cursor" aria-hidden="true"></div>
    </main>

    <script src="shared/physics.js"></script>
    <script>
      // При обновлении страницы всегда открываем её сверху: запрещаем браузеру
      // восстанавливать прежнюю позицию прокрутки (во время игры это не скроллит).
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }

      const body = document.body;
      const world = document.querySelector(".world");
      const rock = document.querySelector(".rock");
      const rockImprint = document.querySelector(".rock-imprint");
      const handCursor = document.querySelector(".hand-cursor");
      const remoteCursorLayer = document.querySelector(".remote-cursors");
      const settingsToggle = document.querySelector(".settings-toggle");
      const settingsPanel = document.querySelector(".settings-panel");
      const trailCanvas = document.querySelector(".trail");
      const trailCtx = trailCanvas.getContext("2d");
      const hintEl = document.querySelector(".hint");
      const sessionStatus = document.querySelector("[data-session-status]");
      const sessionShareToggle = document.querySelector(".session-share-toggle");
      const sessionRestartButton = document.querySelector(".session-restart");
      const finePointer = window.matchMedia("(pointer: fine)");
      const SharedPhysics = window.SisyphusPhysics;

      const trail = {
        points: [],
        lastX: null,
        lastY: null,
        followX: null,
        followY: null,
        pixelRatio: 1,
      };

      const PHASES = SharedPhysics.PHASES;

      // Камера занимает 200vh, но физика не читает DOM-высоту .world.
      const SCENE_VIEWPORT_HEIGHTS = 2;
      const FLOOR_INSET = 0;
      const FIRST_FALL_DELAY_MS = 400;
      const DRAG_LIFT_BASE_SPEED = 420;
      const DRAG_LIFT_FORCE_SPEED = 880;
      const DRAG_LIFT_MIN_SPEED = 220;
      const DRAG_LIFT_MAX_SPEED = 2800;
      const MAX_FRAME_SECONDS = 0.032;

      const params = {
        mass: 4,
        gravity: 1,
        handForce: 5,
        pointerInfluence: 1,
        bounce: 0.35,
        inertia: 0.9,
        sliding: 0.35,
        turbulence: 0.4,

        // След
        trailEnabled: true,
        trailReset: false,
        lineDelay: 0.5,
        trailMaxPoints: 1000,
        trailUnlimited: false,
        trailSampleDist: 6,

        // След — стиль
        blendMode: "difference",
        lineColor: "#ffffff",
        lineColorTail: "#ffffff",
        useGradient: false,
        lineWidth: 6,
        lineOpacity: 0.9,
        dashStyle: "solid",
        dashLength: 12,
        dashGap: 8,
        lineCap: "round",
        lineJoin: "round",
        glow: 0,
        glowColor: "#ffffff",
      };

      const bounds = {
        worldWidth: 0,
        worldHeight: 0,
        rockWidth: 0,
        rockHeight: 0,
        maxX: 0,
        maxY: 0,
      };

      const motion = {
        phase: PHASES.INTRO,
        x: 0,
        y: 0,
        vx: 0,
        vy: 0,
        grabX: 0,
        grabY: 0,
        dragTargetX: 0,
        dragTargetY: 0,
        dragging: false,
        activePointerId: null,
        holdTimerId: null,
        firstFallTimerId: null,
        animationId: null,
        lastFrameAt: null,
        lastPointerX: 0,
        lastPointerY: 0,
        lastPointerAt: 0,
        pointerVx: 0,
        pointerVy: 0,
        alternateHand: false,
        turbTime: 0,
        imprint: null,
      };

      const SHARED_PHYSICS_KEYS = [
        "mass",
        "gravity",
        "handForce",
        "pointerInfluence",
        "bounce",
        "inertia",
        "sliding",
        "turbulence",
      ];
      const RECONNECT_DELAYS = [500, 1000, 2000, 5000];
      const SNAPSHOT_DELAY_MS = 90;
      const POINTER_SEND_INTERVAL_MS = 1000 / 30;
      const RELEASE_HANDOFF_MS = 150;

      function getClientId() {
        try {
          const stored = sessionStorage.getItem("sisyphus-client-id");
          if (stored) {
            return stored;
          }
          const created = crypto.randomUUID();
          sessionStorage.setItem("sisyphus-client-id", created);
          return created;
        } catch (error) {
          return crypto.randomUUID();
        }
      }

      const collab = {
        enabled: false,
        sessionId: new URLSearchParams(window.location.search).get("session") || "",
        clientId: getClientId(),
        leaveToken: null,
        leaving: false,
        socket: null,
        connected: false,
        expired: false,
        sequence: 0,
        reconnectAttempt: 0,
        reconnectTimerId: null,
        pingTimerId: null,
        copyFeedbackTimerId: null,
        renderId: null,
        snapshots: [],
        lastRevision: -1,
        clockOffset: 0,
        clockOffsetReady: false,
        hasControl: false,
        pendingControl: false,
        releasePending: false,
        remoteControllerId: null,
        participants: 1,
        applyingRemotePhysics: false,
        physicsTimerId: null,
        physicsSignature: "",
        pendingPhysicsChanges: Object.create(null),
        sessionCreateInFlight: false,
        firstReleaseTimerId: null,
        lastMoveSentAt: 0,
        lastPointerSentAt: 0,
        lastRenderAt: 0,
        imprint: null,
        releaseHandoff: {
          active: false,
          fromX: 0,
          fromY: 0,
          startedAt: 0,
        },
        localPointer: {
          x: SharedPhysics.WORLD_WIDTH / 2,
          y: 0,
          mode: "grab",
          visible: false,
        },
        remotePointers: new Map(),
      };
      collab.enabled = Boolean(collab.sessionId);

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function setTheme(theme) {
        body.classList.toggle("theme-light", theme === "light");
        body.classList.toggle("theme-dark", theme === "dark");
      }

      function setScrollLocked(locked) {
        document.documentElement.classList.toggle("is-scroll-locked", locked);
        body.classList.toggle("is-scroll-locked", locked);
        if (locked && window.scrollY !== 0) {
          window.scrollTo(0, 0);
        }
      }

      function syncScrollLock(firstTouchHappened) {
        setScrollLocked(!firstTouchHappened);
      }

      function setPhase(phase) {
        motion.phase = phase;
        body.classList.remove(
          "state-intro",
          "state-fallingToBottom",
          "state-play",
          "state-won"
        );
        body.classList.add(`state-${phase}`);
      }

      function maxHoldMs() {
        return clamp(
          (3000 * params.handForce) / (params.mass * params.gravity * 5),
          500,
          3000
        );
      }

      function dragLiftSpeed() {
        const load = Math.max(params.mass * params.gravity, 0.1);
        return clamp(
          DRAG_LIFT_BASE_SPEED + (DRAG_LIFT_FORCE_SPEED * params.handForce) / load,
          DRAG_LIFT_MIN_SPEED,
          DRAG_LIFT_MAX_SPEED
        );
      }

      const STORAGE_KEY = "sisyphus-czar-settings-v2";

      function saveSettings() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(params));
        } catch (error) {
          /* localStorage недоступен — тихо игнорируем */
        }
      }

      function loadSettings() {
        let stored = null;
        try {
          stored = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
        } catch (error) {
          stored = null;
        }
        if (!stored || typeof stored !== "object") {
          return;
        }

        settingsPanel.querySelectorAll("input, select").forEach((el) => {
          const key = el.getAttribute("name");
          if (!key || !(key in stored)) {
            return;
          }
          if (el.type === "checkbox") {
            el.checked = Boolean(stored[key]);
          } else {
            el.value = stored[key];
          }
        });
      }

      function updateControlOutputs() {
        const outputs = {
          mass: params.mass.toFixed(0),
          gravity: params.gravity.toFixed(1),
          handForce: params.handForce.toFixed(0),
          pointerInfluence: params.pointerInfluence.toFixed(1),
          bounce: params.bounce.toFixed(2),
          inertia: params.inertia.toFixed(2),
          sliding: params.sliding.toFixed(2),
          turbulence: params.turbulence.toFixed(2),
          lineDelay: params.lineDelay.toFixed(2),
          trailMaxPoints: params.trailMaxPoints.toFixed(0),
          trailSampleDist: params.trailSampleDist.toFixed(0),
          lineWidth: params.lineWidth.toFixed(0),
          lineOpacity: params.lineOpacity.toFixed(2),
          dashLength: params.dashLength.toFixed(0),
          dashGap: params.dashGap.toFixed(0),
          glow: params.glow.toFixed(0),
        };

        Object.entries(outputs).forEach(([key, value]) => {
          document.querySelectorAll(`[data-output="${key}"]`).forEach((el) => {
            el.textContent = value;
          });
        });
      }

      function readControls(options = {}) {
        const num = (name) =>
          Number(settingsPanel.querySelector(`[name="${name}"]`).value);
        const str = (name) => settingsPanel.querySelector(`[name="${name}"]`).value;
        const bool = (name) =>
          settingsPanel.querySelector(`[name="${name}"]`).checked;

        params.mass = num("mass");
        params.gravity = num("gravity");
        params.handForce = num("handForce");
        params.pointerInfluence = num("pointerInfluence");
        params.bounce = num("bounce");
        params.inertia = num("inertia");
        params.sliding = num("sliding");
        params.turbulence = num("turbulence");

        params.trailEnabled = bool("trailEnabled");
        params.trailReset = bool("trailReset");
        params.lineDelay = num("lineDelay");
        params.trailMaxPoints = num("trailMaxPoints");
        params.trailUnlimited = bool("trailUnlimited");
        params.trailSampleDist = num("trailSampleDist");

        params.blendMode = str("blendMode");
        params.lineColor = str("lineColor");
        params.lineColorTail = str("lineColorTail");
        params.useGradient = bool("useGradient");
        params.lineWidth = num("lineWidth");
        params.lineOpacity = num("lineOpacity");
        params.dashStyle = str("dashStyle");
        params.dashLength = num("dashLength");
        params.dashGap = num("dashGap");
        params.lineCap = str("lineCap");
        params.lineJoin = str("lineJoin");
        params.glow = num("glow");
        params.glowColor = str("glowColor");

        trailCanvas.style.mixBlendMode = params.blendMode;

        const trailLengthInput = settingsPanel.querySelector(
          '[name="trailMaxPoints"]'
        );
        trailLengthInput.disabled = params.trailUnlimited;
        trailLengthInput
          .closest(".control")
          .classList.toggle("is-disabled", params.trailUnlimited);
        trimTrailToLimit();

        updateControlOutputs();
        saveSettings();
        drawTrail();
        const changedKey = options.changedKey || "";
        if (
          collab.enabled &&
          !collab.applyingRemotePhysics &&
          SHARED_PHYSICS_KEYS.includes(changedKey)
        ) {
          collab.pendingPhysicsChanges[changedKey] = params[changedKey];
          scheduleSharedPhysicsUpdate();
        }
      }

      function canShowPhotoCursor(event) {
        return finePointer.matches && (!event.pointerType || event.pointerType === "mouse");
      }

      function moveHandCursor(event) {
        if (!canShowPhotoCursor(event)) {
          return;
        }

        handCursor.style.setProperty("--cursor-x", `${event.clientX}px`);
        handCursor.style.setProperty("--cursor-y", `${event.clientY}px`);
      }

      function showHandCursor(event) {
        if (!canShowPhotoCursor(event)) {
          return;
        }

        moveHandCursor(event);
        handCursor.classList.add("is-visible");
      }

      function hideHandCursor() {
        handCursor.classList.remove("is-visible", "is-grabbing");
      }

      function setGrabbingCursor(isGrabbing) {
        handCursor.classList.toggle("is-grabbing", isGrabbing);
      }

      function toggleHandVariant() {
        motion.alternateHand = !motion.alternateHand;
        handCursor.classList.toggle("is-alternate", motion.alternateHand);
      }

      function setHandToGrab() {
        motion.alternateHand = false;
        handCursor.classList.remove("is-alternate", "is-grabbing");
      }

      function updateBounds() {
        bounds.worldWidth = window.innerWidth;
        bounds.rockWidth = rock.offsetWidth;
        bounds.rockHeight = rock.offsetHeight;
        bounds.maxX = Math.max(0, bounds.worldWidth - bounds.rockWidth);
        bounds.worldHeight = Math.max(
          window.innerHeight * SCENE_VIEWPORT_HEIGHTS,
          bounds.rockHeight + FLOOR_INSET
        );
        bounds.maxY = Math.max(0, bounds.worldHeight - bounds.rockHeight - FLOOR_INSET);
      }

      function setPosition(x, y) {
        updateBounds();
        motion.x = clamp(x, 0, bounds.maxX);
        motion.y = clamp(y, 0, bounds.maxY);
        rock.style.setProperty("--rock-x", `${motion.x}px`);
        rock.style.setProperty("--rock-y", `${motion.y}px`);
      }

      function localImprintToCanonical(imprint) {
        if (!imprint) {
          return null;
        }
        updateBounds();
        const position = localToCanonical(imprint.x, imprint.y);
        return SharedPhysics.sanitizeImprint({
          ...position,
          toleranceX:
            bounds.maxX > 0
              ? (imprint.toleranceX / bounds.maxX) * SharedPhysics.WORLD_WIDTH
              : SharedPhysics.WORLD_WIDTH,
          toleranceY:
            bounds.maxY > 0
              ? (imprint.toleranceY / bounds.maxY) * SharedPhysics.WORLD_HEIGHT
              : 1,
        });
      }

      function sharedImprintAt(position) {
        updateBounds();
        return SharedPhysics.sanitizeImprint({
          ...position,
          toleranceX:
            bounds.maxX > 0
              ? ((bounds.rockWidth * SharedPhysics.IMPRINT_TOLERANCE_FRACTION) /
                  bounds.maxX) *
                SharedPhysics.WORLD_WIDTH
              : SharedPhysics.WORLD_WIDTH,
          toleranceY:
            bounds.maxY > 0
              ? ((bounds.rockHeight * SharedPhysics.IMPRINT_TOLERANCE_FRACTION) /
                  bounds.maxY) *
                SharedPhysics.WORLD_HEIGHT
              : 1,
        });
      }

      function activeLocalImprint() {
        updateBounds();
        if (collab.enabled) {
          const imprint = SharedPhysics.sanitizeImprint(collab.imprint);
          if (!imprint) {
            return null;
          }
          const position = canonicalToLocal(imprint.x, imprint.y);
          return {
            ...position,
            toleranceX:
              (imprint.toleranceX / SharedPhysics.WORLD_WIDTH) * bounds.maxX,
            toleranceY:
              (imprint.toleranceY / SharedPhysics.WORLD_HEIGHT) * bounds.maxY,
          };
        }
        return motion.imprint;
      }

      function renderImprint() {
        const imprint = activeLocalImprint();
        rockImprint.classList.toggle("is-visible", Boolean(imprint));
        if (!imprint) {
          return;
        }
        rockImprint.style.setProperty("--imprint-x", `${imprint.x}px`);
        rockImprint.style.setProperty("--imprint-y", `${imprint.y}px`);
      }

      function createLocalImprint() {
        if (motion.imprint) {
          return motion.imprint;
        }
        updateBounds();
        motion.imprint = {
          x: motion.x,
          y: motion.y,
          toleranceX:
            bounds.rockWidth * SharedPhysics.IMPRINT_TOLERANCE_FRACTION,
          toleranceY:
            bounds.rockHeight * SharedPhysics.IMPRINT_TOLERANCE_FRACTION,
        };
        renderImprint();
        return motion.imprint;
      }

      function setDragTargetFromPointer(event) {
        motion.dragTargetX = event.clientX + window.scrollX - motion.grabX;
        motion.dragTargetY = event.clientY + window.scrollY - motion.grabY;
      }

      function applyDragTargetMovement(deltaSeconds) {
        if (!motion.dragging) {
          return;
        }

        const maxLiftDistance = dragLiftSpeed() * deltaSeconds;
        const nextY =
          motion.dragTargetY < motion.y
            ? Math.max(motion.dragTargetY, motion.y - maxLiftDistance)
            : motion.dragTargetY;

        setPosition(motion.dragTargetX, nextY);
      }

      function initialLocalPosition() {
        updateBounds();
        return canonicalToLocal(
          SharedPhysics.WORLD_WIDTH / 2,
          SharedPhysics.WORLD_HEIGHT * 0.16
        );
      }

      function centerIntroRock() {
        const position = initialLocalPosition();
        setPosition(position.x, position.y);
      }

      function setSessionStatus(text, state = "local") {
        sessionStatus.textContent = text;
        sessionStatus.dataset.state = state;
      }

      function updateSessionStatus() {
        sessionShareToggle.setAttribute("aria-label", "Скопировать ссылку");
        sessionShareToggle.title = "Скопировать ссылку";
        sessionShareToggle.dataset.state = collab.connected ? "online" : "local";
        if (!collab.enabled) {
          setSessionStatus("Локальная сессия", "local");
          return;
        }
        if (collab.expired) {
          setSessionStatus("Сессия истекла или сервер перезапущен", "error");
        } else if (!collab.connected) {
          setSessionStatus("Переподключение…", "connecting");
        } else if (collab.hasControl || collab.pendingControl) {
          setSessionStatus(
            `В сессии: ${collab.participants} · камень у вас`,
            "online"
          );
        } else if (collab.remoteControllerId) {
          setSessionStatus(
            `В сессии: ${collab.participants} · камень держит другой участник`,
            "online"
          );
        } else {
          setSessionStatus(
            `В сессии: ${collab.participants} · камень свободен`,
            "online"
          );
        }
      }

      function appUrl(relativePath) {
        const base = new URL(window.location.href);
        base.search = "";
        base.hash = "";
        if (!base.pathname.endsWith("/")) {
          base.pathname = base.pathname.replace(/[^/]+$/, "");
        }
        return new URL(relativePath, base);
      }

      function localToCanonical(x, y) {
        updateBounds();
        return {
          x:
            bounds.maxX > 0
              ? clamp((x / bounds.maxX) * SharedPhysics.WORLD_WIDTH, 0, SharedPhysics.WORLD_WIDTH)
              : SharedPhysics.WORLD_WIDTH / 2,
          y:
            bounds.maxY > 0
              ? clamp((y / bounds.maxY) * SharedPhysics.WORLD_HEIGHT, 0, SharedPhysics.WORLD_HEIGHT)
              : 0,
        };
      }

      function canonicalToLocal(x, y) {
        updateBounds();
        return {
          x: (clamp(x, 0, SharedPhysics.WORLD_WIDTH) / SharedPhysics.WORLD_WIDTH) * bounds.maxX,
          y: (clamp(y, 0, SharedPhysics.WORLD_HEIGHT) / SharedPhysics.WORLD_HEIGHT) * bounds.maxY,
        };
      }

      function pointerEventToCanonical(event) {
        const rect = world.getBoundingClientRect();
        updateBounds();
        const localY = event.clientY - rect.top;
        return {
          x:
            rect.width > 0
              ? clamp(
                  ((event.clientX - rect.left) / rect.width) * SharedPhysics.WORLD_WIDTH,
                  0,
                  SharedPhysics.WORLD_WIDTH
                )
              : SharedPhysics.WORLD_WIDTH / 2,
          y:
            bounds.maxY > 0
              ? clamp(
                  (localY / bounds.maxY) * SharedPhysics.WORLD_HEIGHT,
                  0,
                  SharedPhysics.WORLD_HEIGHT
                )
              : 0,
        };
      }

      function pointerIsOverRock(event) {
        if (!event || !Number.isFinite(event.clientX) || !Number.isFinite(event.clientY)) {
          return false;
        }
        const target = document.elementFromPoint(event.clientX, event.clientY);
        return target === rock || rock.contains(target);
      }

      function updateLocalSharedPointer(event, mode, visible) {
        if (event) {
          const position = pointerEventToCanonical(event);
          collab.localPointer.x = position.x;
          collab.localPointer.y = position.y;
        }
        collab.localPointer.mode = mode === "grabbing" ? "grabbing" : "grab";
        collab.localPointer.visible = Boolean(visible);
        return { ...collab.localPointer };
      }

      function sendSharedPointer(event, mode, visible, force = false) {
        const payload = updateLocalSharedPointer(event, mode, visible);
        if (!collab.enabled || !collab.connected) {
          return payload;
        }
        const now = performance.now();
        if (!force && now - collab.lastPointerSentAt < POINTER_SEND_INTERVAL_MS) {
          return payload;
        }
        collab.lastPointerSentAt = now;
        sendShared("pointer.update", payload);
        return payload;
      }

      function removeRemotePointer(clientId) {
        const pointer = collab.remotePointers.get(clientId);
        if (!pointer) {
          return;
        }
        pointer.element.remove();
        collab.remotePointers.delete(clientId);
      }

      function clearRemotePointers() {
        collab.remotePointers.forEach((pointer) => pointer.element.remove());
        collab.remotePointers.clear();
      }

      function receiveRemotePointer(payload) {
        if (!payload || payload.clientId === collab.clientId) {
          return;
        }
        const clientId = String(payload.clientId || "");
        const x = Number(payload.x);
        const y = Number(payload.y);
        const mode = payload.mode;
        if (
          !clientId ||
          !Number.isFinite(x) ||
          !Number.isFinite(y) ||
          x < 0 ||
          x > SharedPhysics.WORLD_WIDTH ||
          y < 0 ||
          y > SharedPhysics.WORLD_HEIGHT ||
          !["grab", "grabbing"].includes(mode)
        ) {
          return;
        }
        if (!payload.visible) {
          removeRemotePointer(clientId);
          return;
        }

        let pointer = collab.remotePointers.get(clientId);
        if (!pointer) {
          const element = document.createElement("div");
          element.className = "hand-cursor is-remote is-visible";
          element.dataset.remoteCursor = clientId;
          element.dataset.testid = "remote-cursor";
          remoteCursorLayer.appendChild(element);
          pointer = { element, x, y, targetX: x, targetY: y };
          collab.remotePointers.set(clientId, pointer);
        }
        pointer.targetX = x;
        pointer.targetY = y;
        pointer.element.classList.toggle("is-grabbing", mode === "grabbing");
      }

      function syncRemotePointers(pointers) {
        const visibleIds = new Set();
        if (Array.isArray(pointers)) {
          pointers.forEach((pointer) => {
            if (pointer && pointer.visible && pointer.clientId !== collab.clientId) {
              visibleIds.add(String(pointer.clientId));
            }
            receiveRemotePointer(pointer);
          });
        }
        [...collab.remotePointers.keys()].forEach((clientId) => {
          if (!visibleIds.has(clientId)) {
            removeRemotePointer(clientId);
          }
        });
      }

      function renderRemotePointers() {
        if (collab.remotePointers.size === 0) {
          return;
        }
        const rect = world.getBoundingClientRect();
        updateBounds();
        collab.remotePointers.forEach((pointer) => {
          pointer.x += (pointer.targetX - pointer.x) * 0.42;
          pointer.y += (pointer.targetY - pointer.y) * 0.42;
          const local = canonicalToLocal(pointer.x, pointer.y);
          const viewportX = rect.left + local.x;
          const viewportY = rect.top + local.y;
          pointer.element.style.setProperty("--cursor-x", `${viewportX}px`);
          pointer.element.style.setProperty("--cursor-y", `${viewportY}px`);
        });
      }

      function localVelocityToCanonical(vx, vy) {
        updateBounds();
        return {
          vx: bounds.maxX > 0 ? (vx / bounds.maxX) * SharedPhysics.WORLD_WIDTH : 0,
          vy: bounds.maxY > 0 ? (vy / bounds.maxY) * SharedPhysics.WORLD_HEIGHT : 0,
        };
      }

      function canonicalVelocityToLocal(vx, vy) {
        updateBounds();
        return {
          vx: (vx / SharedPhysics.WORLD_WIDTH) * bounds.maxX,
          vy: (vy / SharedPhysics.WORLD_HEIGHT) * bounds.maxY,
        };
      }

      function sharedPhysicsPayload() {
        return Object.fromEntries(
          SHARED_PHYSICS_KEYS.map((key) => [key, params[key]])
        );
      }

      function currentSharedState() {
        const position = localToCanonical(motion.x, motion.y);
        const velocity = localVelocityToCanonical(motion.vx, motion.vy);
        return {
          phase: motion.phase,
          x: position.x,
          y: position.y,
          vx: velocity.vx,
          vy: velocity.vy,
          turbTime: motion.turbTime,
        };
      }

      function applyCanonicalMotion(state) {
        const position = canonicalToLocal(state.x, state.y);
        const velocity = canonicalVelocityToLocal(state.vx, state.vy);
        setPosition(position.x, position.y);
        motion.vx = velocity.vx;
        motion.vy = velocity.vy;
        motion.turbTime = state.turbTime;
      }

      function initialSharedState() {
        const position = initialLocalPosition();
        const canonical = localToCanonical(position.x, position.y);
        return {
          phase: PHASES.INTRO,
          x: canonical.x,
          y: canonical.y,
          vx: 0,
          vy: 0,
          turbTime: 0,
        };
      }

      function currentSharedTrail() {
        updateBounds();
        const xScale =
          bounds.maxX > 0 ? SharedPhysics.WORLD_WIDTH / bounds.maxX : 0;
        const yScale =
          bounds.maxY > 0 ? SharedPhysics.WORLD_HEIGHT / bounds.maxY : 0;
        return trail.points.slice(-1000).map((point) => {
          const x =
            xScale > 0
              ? clamp(
                  (point.x - bounds.rockWidth / 2) * xScale,
                  0,
                  SharedPhysics.WORLD_WIDTH
                )
              : SharedPhysics.WORLD_WIDTH / 2;
          const y =
            yScale > 0
              ? clamp(
                  (point.y - bounds.rockHeight / 2) * yScale,
                  0,
                  SharedPhysics.WORLD_HEIGHT
                )
              : 0;
          return [Math.round(x), Math.round(y)];
        });
      }

      function currentSharedImprint() {
        if (collab.imprint) {
          return { ...collab.imprint };
        }
        return localImprintToCanonical(motion.imprint);
      }

      function loadSharedTrail(points) {
        if (!Array.isArray(points)) {
          return;
        }
        updateBounds();
        const xScale = bounds.maxX / SharedPhysics.WORLD_WIDTH;
        const yScale = bounds.maxY / SharedPhysics.WORLD_HEIGHT;
        trail.points = points.slice(-1000).flatMap((point) => {
          if (!Array.isArray(point) || point.length < 2) {
            return [];
          }
          const x = Number(point[0]);
          const y = Number(point[1]);
          if (!Number.isFinite(x) || !Number.isFinite(y)) {
            return [];
          }
          return [
            {
              x:
                clamp(x, 0, SharedPhysics.WORLD_WIDTH) * xScale +
                bounds.rockWidth / 2,
              y:
                clamp(y, 0, SharedPhysics.WORLD_HEIGHT) * yScale +
                bounds.rockHeight / 2,
            },
          ];
        });
        const last = trail.points.at(-1);
        trail.lastX = last ? last.x : null;
        trail.lastY = last ? last.y : null;
        trail.followX = trail.lastX;
        trail.followY = trail.lastY;
        drawTrail();
      }

      function applySharedPhysics(physics) {
        if (!physics || typeof physics !== "object") {
          return;
        }
        const signature = SHARED_PHYSICS_KEYS.map((key) =>
          Number(physics[key])
        ).join(":");
        collab.physicsSignature = signature;
        let controlsChanged = false;
        SHARED_PHYSICS_KEYS.forEach((key) => {
          const remoteValue = Number(physics[key]);
          if (!Number.isFinite(remoteValue)) {
            return;
          }
          if (Object.hasOwn(collab.pendingPhysicsChanges, key)) {
            if (
              Math.abs(
                Number(collab.pendingPhysicsChanges[key]) - remoteValue
              ) < 1e-9
            ) {
              delete collab.pendingPhysicsChanges[key];
            } else {
              return;
            }
          }
          const input = settingsPanel.querySelector(`[name="${key}"]`);
          if (input && Number(input.value) !== remoteValue) {
            input.value = String(remoteValue);
            controlsChanged = true;
          }
        });
        if (controlsChanged) {
          collab.applyingRemotePhysics = true;
          try {
            readControls();
          } finally {
            collab.applyingRemotePhysics = false;
          }
        }
      }

      function scheduleSharedPhysicsUpdate() {
        if (
          !collab.enabled ||
          collab.applyingRemotePhysics
        ) {
          return;
        }
        if (!collab.connected) {
          return;
        }
        window.clearTimeout(collab.physicsTimerId);
        collab.physicsTimerId = window.setTimeout(() => {
          collab.physicsTimerId = null;
          const payload = { ...collab.pendingPhysicsChanges };
          if (Object.keys(payload).length > 0) {
            sendShared("physics.update", payload);
          }
        }, 100);
      }

      function showCopiedLinkFeedback() {
        window.clearTimeout(collab.copyFeedbackTimerId);
        sessionShareToggle.classList.add("is-copied");
        sessionShareToggle.setAttribute("aria-label", "Ссылка скопирована");
        collab.copyFeedbackTimerId = window.setTimeout(() => {
          collab.copyFeedbackTimerId = null;
          sessionShareToggle.classList.remove("is-copied");
          updateSessionStatus();
        }, 400);
      }

      async function copySessionLink(options = {}) {
        const showToggleFeedback = Boolean(options.showToggleFeedback);
        const announce = options.announce !== false;
        const link = options.link || window.location.href;
        try {
          await navigator.clipboard.writeText(link);
        } catch (error) {
          const input = document.createElement("textarea");
          input.value = link;
          input.setAttribute("readonly", "");
          input.style.position = "fixed";
          input.style.opacity = "0";
          document.body.appendChild(input);
          input.select();
          const copied = document.execCommand("copy");
          input.remove();
          if (!copied) {
            window.prompt("Скопируйте ссылку на сессию", link);
          }
        }
        if (showToggleFeedback) {
          showCopiedLinkFeedback();
        }
        if (announce) {
          setSessionStatus("Ссылка скопирована", collab.connected ? "online" : "connecting");
          window.setTimeout(updateSessionStatus, 1600);
        }
      }

      async function createSharedSession() {
        if (collab.sessionCreateInFlight) {
          return;
        }
        if (collab.enabled && collab.sessionId && !collab.expired) {
          return;
        }
        if (window.location.protocol === "file:") {
          setSessionStatus("Для ссылки запустите приложение через Docker", "error");
          return;
        }

        collab.sessionCreateInFlight = true;
        setSessionStatus("Создаём общую сессию…", "connecting");
        try {
          const response = await fetch(appUrl("api/sessions"), {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              state: currentSharedState(),
              physics: sharedPhysicsPayload(),
              trail: currentSharedTrail(),
              imprint: currentSharedImprint(),
            }),
          });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const result = await response.json();
          const url = new URL(window.location.href);
          url.searchParams.set("session", result.sessionId);
          window.location.replace(url);
        } catch (error) {
          collab.enabled = false;
          setSessionStatus("Не удалось создать сессию", "error");
        } finally {
          collab.sessionCreateInFlight = false;
          updateSessionStatus();
        }
      }

      async function copyCurrentSessionLink() {
        await copySessionLink({ showToggleFeedback: true, announce: false });
      }

      function sendShared(type, payload = {}) {
        if (!collab.socket || collab.socket.readyState !== WebSocket.OPEN) {
          return false;
        }
        collab.sequence += 1;
        collab.socket.send(
          JSON.stringify({ v: 1, type, seq: collab.sequence, payload })
        );
        return true;
      }

      function startSharedReleaseHandoff() {
        if (!collab.enabled) {
          return;
        }
        collab.releaseHandoff.active = true;
        collab.releaseHandoff.fromX = motion.x;
        collab.releaseHandoff.fromY = motion.y;
        collab.releaseHandoff.startedAt = 0;
      }

      function clearSharedReleaseHandoff() {
        collab.releaseHandoff.active = false;
        collab.releaseHandoff.startedAt = 0;
      }

      function applySharedReleaseHandoff(local, phase) {
        if (!collab.releaseHandoff.active) {
          return local;
        }
        if (phase === PHASES.INTRO || phase === PHASES.WON) {
          clearSharedReleaseHandoff();
          return local;
        }

        const now = performance.now();
        if (collab.releaseHandoff.startedAt === 0) {
          collab.releaseHandoff.startedAt = now;
        }
        const progress = clamp(
          (now - collab.releaseHandoff.startedAt) / RELEASE_HANDOFF_MS,
          0,
          1
        );
        const eased = progress * progress * (3 - 2 * progress);
        const position = {
          x:
            collab.releaseHandoff.fromX +
            (local.x - collab.releaseHandoff.fromX) * eased,
          y:
            collab.releaseHandoff.fromY +
            (local.y - collab.releaseHandoff.fromY) * eased,
        };
        if (progress >= 1) {
          clearSharedReleaseHandoff();
        }
        return position;
      }

      function resetLocalExperience() {
        const pointerId = motion.activePointerId;
        window.clearTimeout(collab.firstReleaseTimerId);
        collab.firstReleaseTimerId = null;
        clearHoldTimer();
        clearFirstFallTimer();
        stopLoop();
        motion.dragging = false;
        motion.activePointerId = null;
        motion.vx = 0;
        motion.vy = 0;
        motion.pointerVx = 0;
        motion.pointerVy = 0;
        motion.turbTime = 0;
        motion.imprint = null;
        collab.imprint = null;
        collab.snapshots = [];
        clearSharedReleaseHandoff();
        collab.hasControl = false;
        collab.pendingControl = false;
        collab.releasePending = false;
        collab.remoteControllerId = null;
        rock.classList.remove("is-dragging", "is-falling");
        releasePointerCapture(pointerId);
        setGrabbingCursor(false);
        setHandToGrab();
        hideHandCursor();
        updateLocalSharedPointer(null, "grab", false);
        setPhase(PHASES.INTRO);
        setTheme("light");
        syncScrollLock(false);
        resetTrail();
        renderImprint();
        centerIntroRock();
        updateSessionStatus();
      }

      function restartExperience() {
        if (collab.enabled) {
          if (sendShared("session.restart", initialSharedState())) {
            resetLocalExperience();
          } else {
            updateSessionStatus();
          }
          return;
        }
        resetLocalExperience();
      }

      function clearSharedConnectionTimers() {
        window.clearTimeout(collab.reconnectTimerId);
        window.clearInterval(collab.pingTimerId);
        collab.reconnectTimerId = null;
        collab.pingTimerId = null;
      }

      function scheduleSharedReconnect() {
        if (
          !collab.enabled ||
          collab.expired ||
          collab.leaving ||
          collab.reconnectTimerId !== null
        ) {
          return;
        }
        const delay = RECONNECT_DELAYS[
          Math.min(collab.reconnectAttempt, RECONNECT_DELAYS.length - 1)
        ];
        collab.reconnectAttempt += 1;
        collab.reconnectTimerId = window.setTimeout(() => {
          collab.reconnectTimerId = null;
          connectSharedSession();
        }, delay);
      }

      function connectSharedSession() {
        if (
          !collab.enabled ||
          !collab.sessionId ||
          collab.expired ||
          collab.leaving
        ) {
          return;
        }
        clearSharedConnectionTimers();
        collab.connected = false;
        updateSessionStatus();

        const endpoint = appUrl("realtime");
        endpoint.protocol = endpoint.protocol === "https:" ? "wss:" : "ws:";
        endpoint.searchParams.set("session", collab.sessionId);
        endpoint.searchParams.set("client", collab.clientId);
        const socket = new WebSocket(endpoint);
        collab.socket = socket;

        socket.addEventListener("open", () => {
          if (collab.socket !== socket) {
            return;
          }
          collab.connected = true;
          collab.reconnectAttempt = 0;
          collab.pingTimerId = window.setInterval(() => {
            sendShared("ping", { clientTime: Date.now() });
          }, 20_000);
          sendShared("ping", { clientTime: Date.now() });
          sendSharedPointer(
            null,
            collab.localPointer.mode,
            collab.localPointer.visible,
            true
          );
          scheduleSharedPhysicsUpdate();
          updateSessionStatus();
        });

        socket.addEventListener("message", (event) => {
          let message;
          try {
            message = JSON.parse(event.data);
          } catch (error) {
            return;
          }
          handleSharedMessage(message);
        });

        socket.addEventListener("close", (event) => {
          if (collab.socket !== socket) {
            return;
          }
          clearSharedConnectionTimers();
          collab.connected = false;
          collab.hasControl = false;
          collab.pendingControl = false;
          collab.releasePending = false;
          cancelSharedLocalDrag();
          updateLocalSharedPointer(null, "grab", false);
          hideHandCursor();
          clearRemotePointers();
          if (event.code === 4004) {
            collab.expired = true;
          }
          updateSessionStatus();
          if (collab.expired) {
            void createSharedSession();
          }
          scheduleSharedReconnect();
        });
      }

      function handleSharedMessage(message) {
        if (!message || message.v !== 1 || typeof message.type !== "string") {
          return;
        }
        const payload = message.payload || {};
        if (message.type === "session.snapshot") {
          receiveSharedSnapshot(payload);
        } else if (message.type === "control.granted") {
          collab.pendingControl = false;
          collab.hasControl = true;
          collab.remoteControllerId = collab.clientId;
          syncScrollLock(true);
          updateSessionStatus();
        } else if (message.type === "control.denied") {
          collab.pendingControl = false;
          collab.hasControl = false;
            cancelSharedLocalDrag();
          updateSessionStatus();
        } else if (message.type === "presence.update") {
          collab.participants = Math.max(1, Number(payload.participants) || 1);
          collab.remoteControllerId = payload.controllerId || null;
          syncRemotePointers(payload.pointers);
          updateSessionStatus();
        } else if (message.type === "pointer.update") {
          receiveRemotePointer(payload);
        } else if (message.type === "pong") {
          const sample = Date.now() - Number(payload.serverTime || Date.now());
          collab.clockOffset = collab.clockOffsetReady
            ? collab.clockOffset * 0.8 + sample * 0.2
            : sample;
          collab.clockOffsetReady = true;
        } else if (message.type === "error") {
          if (payload.code === "session_not_found") {
            collab.expired = true;
            collab.connected = false;
            updateSessionStatus();
            void createSharedSession();
          }
        }
      }

      function receiveSharedSnapshot(payload) {
        if (
          typeof payload.leaveToken === "string" &&
          /^[A-Za-z0-9_-]{22}$/.test(payload.leaveToken)
        ) {
          collab.leaveToken = payload.leaveToken;
        }

        const revision = Number(payload.revision);
        if (!Number.isSafeInteger(revision) || revision <= collab.lastRevision) {
          return;
        }
        if (!Object.values(PHASES).includes(payload.phase)) {
          return;
        }

        collab.lastRevision = revision;
        const offsetSample = Date.now() - Number(payload.serverTime || Date.now());
        collab.clockOffset = collab.clockOffsetReady
          ? collab.clockOffset * 0.8 + offsetSample * 0.2
          : offsetSample;
        collab.clockOffsetReady = true;
        applySharedPhysics(payload.physics);

        collab.imprint = SharedPhysics.sanitizeImprint(payload.imprint);
        syncScrollLock(
          Boolean(collab.imprint) || payload.phase !== PHASES.INTRO
        );
        renderImprint();

        if (Array.isArray(payload.trail)) {
          loadSharedTrail(payload.trail);
        }
        if (
          payload.phase === PHASES.INTRO &&
          !collab.imprint &&
          Array.isArray(payload.trail)
        ) {
          collab.snapshots = [];
        }

        const snapshot = {
          phase: payload.phase,
          x: Number(payload.x) || 0,
          y: Number(payload.y) || 0,
          vx: Number(payload.vx) || 0,
          vy: Number(payload.vy) || 0,
          dragging: Boolean(payload.dragging),
          controllerId: payload.controllerId || null,
          revision,
          serverTime: Number(payload.serverTime) || Date.now(),
        };
        if (
          collab.releasePending &&
          snapshot.dragging &&
          snapshot.controllerId === collab.clientId
        ) {
          return;
        }
        if (
          collab.releasePending &&
          (!snapshot.dragging || snapshot.controllerId !== collab.clientId)
        ) {
          collab.releasePending = false;
        }
        const localControlWasEnding =
          (collab.hasControl || collab.pendingControl || motion.dragging) &&
          (!snapshot.dragging || snapshot.controllerId !== collab.clientId) &&
          snapshot.phase !== PHASES.INTRO &&
          snapshot.phase !== PHASES.WON;
        if (localControlWasEnding) {
          startSharedReleaseHandoff();
          collab.snapshots = [];
        }
        collab.snapshots.push(snapshot);
        collab.snapshots.sort((left, right) => left.serverTime - right.serverTime);
        if (collab.snapshots.length > 12) {
          collab.snapshots.splice(0, collab.snapshots.length - 12);
        }

        const ownsControl =
          snapshot.dragging && snapshot.controllerId === collab.clientId;
        collab.remoteControllerId = snapshot.controllerId;
        if (ownsControl) {
          collab.hasControl = true;
          collab.pendingControl = false;
          collab.releasePending = false;
          clearSharedReleaseHandoff();
        } else if (
          collab.hasControl ||
          collab.pendingControl ||
          (snapshot.controllerId && snapshot.controllerId !== collab.clientId)
        ) {
          collab.hasControl = false;
          collab.pendingControl = false;
          cancelSharedLocalDrag();
        }

        setPhase(snapshot.phase);
        setTheme(
          snapshot.phase === PHASES.INTRO || snapshot.phase === PHASES.WON
            ? "light"
            : "dark"
        );

        if (snapshot.phase === PHASES.WON) {
          collab.hasControl = false;
          collab.pendingControl = false;
          cancelSharedLocalDrag();
          collab.snapshots = [snapshot];
          applySharedFrame(snapshot);
        } else if (collab.snapshots.length === 1 && !motion.dragging) {
          applySharedFrame(snapshot);
        }

        startSharedRenderLoop();
        updateSessionStatus();
      }

      function leaveSharedSession(event) {
        if (
          event?.persisted ||
          collab.leaving ||
          !collab.enabled ||
          !collab.sessionId ||
          !collab.leaveToken ||
          window.location.protocol === "file:"
        ) {
          return;
        }

        collab.leaving = true;
        clearSharedConnectionTimers();
        const endpoint = appUrl(
          `api/sessions/${encodeURIComponent(collab.sessionId)}/leave`
        );
        const body = JSON.stringify({
          clientId: collab.clientId,
          leaveToken: collab.leaveToken,
        });
        let queued = false;
        try {
          queued = navigator.sendBeacon(
            endpoint,
            new Blob([body], { type: "application/json" })
          );
        } catch (error) {
          queued = false;
        }
        if (!queued) {
          fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body,
            keepalive: true,
          }).catch(() => {});
        }
      }

      function applySharedFrame(snapshot) {
        if (!snapshot || (motion.dragging && (collab.hasControl || collab.pendingControl))) {
          return;
        }
        const local = canonicalToLocal(snapshot.x, snapshot.y);
        const velocity = canonicalVelocityToLocal(snapshot.vx, snapshot.vy);
        const position = applySharedReleaseHandoff(local, snapshot.phase);
        setPosition(position.x, position.y);
        motion.vx = velocity.vx;
        motion.vy = velocity.vy;
        motion.turbTime = 0;

        const visiblyDragging = Boolean(snapshot.dragging);
        const visiblyFalling =
          !visiblyDragging &&
          snapshot.phase !== PHASES.INTRO &&
          snapshot.phase !== PHASES.WON &&
          (snapshot.phase === PHASES.FALLING ||
            Math.abs(snapshot.vx) > 0.5 ||
            Math.abs(snapshot.vy) > 0.5);
        rock.classList.toggle("is-dragging", visiblyDragging);
        rock.classList.toggle("is-falling", visiblyFalling);
      }

      function renderSharedFrame(now) {
        collab.renderId = window.requestAnimationFrame(renderSharedFrame);
        const deltaSeconds = clamp(
          (now - (collab.lastRenderAt || now)) / 1000,
          0,
          MAX_FRAME_SECONDS
        );
        collab.lastRenderAt = now;

        if (!motion.dragging && collab.snapshots.length > 0) {
          const targetServerTime =
            Date.now() - collab.clockOffset - SNAPSHOT_DELAY_MS;
          while (
            collab.snapshots.length > 2 &&
            collab.snapshots[1].serverTime <= targetServerTime
          ) {
            collab.snapshots.shift();
          }

          const first = collab.snapshots[0];
          const second = collab.snapshots[1];
          if (
            second &&
            targetServerTime >= first.serverTime &&
            targetServerTime <= second.serverTime
          ) {
            const range = Math.max(second.serverTime - first.serverTime, 1);
            const factor = clamp((targetServerTime - first.serverTime) / range, 0, 1);
            applySharedFrame({
              ...second,
              x: first.x + (second.x - first.x) * factor,
              y: first.y + (second.y - first.y) * factor,
              vx: first.vx + (second.vx - first.vx) * factor,
              vy: first.vy + (second.vy - first.vy) * factor,
            });
          } else {
            applySharedFrame(second || first);
          }
        }

        if (motion.phase === PHASES.FALLING || motion.phase === PHASES.PLAY) {
          recordTrailPoint(deltaSeconds);
        }
        drawTrail();
        renderRemotePointers();
      }

      function startSharedRenderLoop() {
        stopLoop();
        if (collab.renderId === null) {
          collab.lastRenderAt = performance.now();
          collab.renderId = window.requestAnimationFrame(renderSharedFrame);
        }
      }

      function cancelSharedLocalDrag(releaseCapture = true) {
        window.clearTimeout(collab.firstReleaseTimerId);
        collab.firstReleaseTimerId = null;
        const pointerId = motion.activePointerId;
        motion.dragging = false;
        motion.activePointerId = null;
        rock.classList.remove("is-dragging");
        setGrabbingCursor(false);
        setHandToGrab();
        updateLocalSharedPointer(
          null,
          "grab",
