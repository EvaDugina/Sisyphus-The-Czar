# nginx-конфиг ТОЛЬКО для dev-режима (docker-compose.dev.yml).
# Задача — всегда отдавать свежий файл с примонтированного тома.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # sendfile off — страховка от отдачи устаревшего содержимого с bind-mount
    # (Docker Desktop / Windows / WSL2 иногда кэширует файловые дескрипторы).
    sendfile off;

    location / {
        try_files $uri $uri/ =404;
        # Отключаем кэш браузера, чтобы обновление страницы всегда показывало
        # последнюю версию без хард-релоада.
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        expires -1;
    }
}
